<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ungle Angle - Dashboard</title>
	<link rel="icon" href="source/imgs/icon.png" type="image/png">
	<link rel="stylesheet" href="stylesheet/common.css">
	<link rel="stylesheet" href="stylesheet/style.css">
</head>
<body>

	<header>
		<h1>Ungle Angle</h1>
		<p class="top-message">
			<br>The Music Works by lmu
		</p>
	</header>

	<main>
		<section class="box">
			<h2>Project Dashboard</h2>
			
			<div class="status-legend-panel">
				<div class="legend-item">
					<span class="status-badge progress"></span>
					<span class="legend-label">In Progress</span>
				</div>
				<div class="legend-item">
					<span class="status-badge complete"></span>
					<span class="legend-label">Completed</span>
				</div>
				<div class="legend-item">
					<span class="status-badge cancel"></span>
					<span class="legend-label">Abandoned</span>
				</div>
				<div class="legend-item">
					<span class="status-badge rejection"></span>
					<span class="legend-label">Scrapped</span>
				</div>
			</div>

			<div id="project-grid-container"></div>
		</section>
	</main>

	<footer>
		<p class="copyright">
			© 2026 lmu by hizuki_1227.
			<br>All Rights Reserved.
		</p>
	</footer>

	<script src="script/list-renderer.js"></script>
</body>
</html>
